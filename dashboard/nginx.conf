# HTTP: API/auth sem redirect (worker PDV1 usa HTTP)
# Dashboard UI redireciona para HTTPS
server {
    listen 80;
    server_name _;
    client_max_body_size 200m;

    # Worker do PDV acessa a API via HTTP — sem redirect
    location /api/ {
        limit_req zone=api_global burst=40 nodelay;
        proxy_pass http://easy-auditoria-api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto http;
        proxy_read_timeout 300s;
    }

    location /auth/ {
        limit_req zone=api_login burst=5 nodelay;
        proxy_pass http://easy-auditoria-api:8000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Dashboard UI → redireciona para HTTPS
    location / {
        return 301 https://$host:8099$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;
    client_max_body_size 200m;

    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        limit_req zone=api_global burst=40 nodelay;
        proxy_pass http://easy-auditoria-api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }

    location /auth/ {
        limit_req zone=api_login burst=5 nodelay;
        proxy_pass http://easy-auditoria-api:8000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Proxy para o video streamer no PDV1 (resolve mixed content HTTPS→HTTP)
    location /streamer/ {
        limit_req zone=api_global burst=20 nodelay;
        proxy_pass http://138.99.28.216:8765/;
        proxy_set_header Host $host;
        proxy_set_header Range "";
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
        proxy_cache off;
        add_header Accept-Ranges none always;
        add_header X-Accel-Buffering no always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # config.js tem credenciais — nunca cachear
    location = /config.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location ~* \.(css|js|svg|png|jpg|jpeg|webp)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}
